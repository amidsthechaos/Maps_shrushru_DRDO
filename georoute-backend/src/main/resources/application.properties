# ─── Database (local PostgreSQL + PostGIS) ──────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/georoute
spring.datasource.username=postgres
spring.datasource.password=Password
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema is owned by db/init.sql; we manage it ourselves.
spring.jpa.hibernate.ddl-auto=none
# Hibernate 6 auto-detects PostGIS spatial support when hibernate-spatial is on the
# classpath. Do NOT set a deprecated spatial dialect here.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── GIS Data Paths (local filesystem — no URLs) ────────────────────────────
geotiff.base.path=../data/roads_basemap.tif
shapefile.base.path=../data/gis_osm_roads_free_1.shp
# Set true ONCE to re-ingest roads after fixing data/parser, then set back to false.
shapefile.force-reload=false

# LRU cache size for coordinate→node lookups during streaming ingest (default 300k ≈ 30–50 MB).
shapefile.node-cache.size=300000

spring.jdbc.template.query-timeout=30
# Optional: attribute names in the road Shapefile
shapefile.attr.name=name
shapefile.attr.fclass=fclass
shapefile.attr.oneway=oneway

# ─── Tile Server ────────────────────────────────────────────────────────────
tiles.cache.dir=./tile-cache
tiles.cache.enabled=true

# ─── Routing ────────────────────────────────────────────────────────────────
# Used by the A* admissible heuristic (h must never overestimate cost).
routing.max.speed.kmh=110

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=8080

# ─── CORS: allow only the local Angular dev server ──────────────────────────
cors.allowed-origins=http://localhost:4200,http://localhost:8080,http://127.0.0.1:8080
